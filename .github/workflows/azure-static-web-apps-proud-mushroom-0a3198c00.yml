name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main # Change this if your main branch has a different name (e.g., master)
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# 1. CRITICAL ADDITION: Grant permissions for GitHub to generate the OIDC token
permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      # 2. CRITICAL ADDITION: Fetch the ID token from GitHub
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()

      # 3. CRITICAL UPDATE: Deploy using github_id_token instead of the API token secret
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "build" # IMPORTANT: Change this to "dist" or whatever your build output folder is
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      # If you use PRs, the closure job also needs the token
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()

      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          github_id_token: ${{ steps.idtoken.outputs.result }}
